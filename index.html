<head>
<title>
try simple-markdown!
</title>
<script src="simple-markdown.js"></script>
<style>
body {
  background-color: snow;
  width: 100%;
  height: 100%;
  display: flex;
  margin: 0;
  border-radius: 1em;
  font-family: Helvetica;
  font-size: 1.1em;
}
* {
  box-sizing: border-box;
}
#container {
  display: flex;
  flex: 0 0 100%;
  align-self: stretch;
}
#source {
  flex: 0 0 50%;
  align-self: stretch;
  resize: none;
  border: 1rem solid mediumturquoise;
  background-color: lightcyan;
  font-family: monospace;
  font-size: 1em;
}
#output {
  flex: 0 0 50%;
  align-self: stretch;
  padding: 1rem;
  overflow: scroll;
}
h1:first-child {
  margin-top: 0;
}
img {
  max-width: 100%;
}

/* Output Styles */
h1, h2, h3, h4, h5, h6 {
  background-color: darkslategray;
  color: white;
  border-radius: 5px;
  padding-top: 5px;
  padding-bottom: 5px;
  padding-left: 10px;
  padding-right: 10px;
}
h1 code, h2 code, h3 code {
  color: lightskyblue;
}
pre {
  background-color: azure;
  padding: 0.5em;
  border-radius: 1em;
}
a:link, a:visited {
  color: green;
  font-weight: bold;
  text-decoration: none;
}
a:hover {
  color: darkturquoise;
}

li>p:first-child>strong:first-child>code {
  font-size: 1.2em;
  background-color: darkslategray;
  color: aliceblue;
  border-radius: 5px;
  padding-left: 5px;
  padding-right: 5px;
  padding-top: 1px;
  padding-bottom: 3px;
}
p code {
  background-color: lavender;
  border-radius: 3px;
  padding-left: 3px;
  padding-right: 3px;
}
</style>
</head>
<body>
<div id="container">
<textarea id="source">
*Loading README...*
</textarea>
<div id="output" ></div>
<script>
var rules = {};
for (var rule in SimpleMarkdown.defaultRules) {
  rules[rule] = SimpleMarkdown.defaultRules[rule];
}
rules.paragraph = {
  order: SimpleMarkdown.defaultRules.paragraph.order,
  match: SimpleMarkdown.defaultRules.paragraph.match,
  parse: SimpleMarkdown.defaultRules.paragraph.parse,
  html: function(node, output, state) {
    // use default p tags
    return '<p>' + output(node.content) + '</p>';
  },
};
var output = SimpleMarkdown.outputFor(rules, 'html');
var sourceBox = document.getElementById('source');
var outputBox = document.getElementById('output');
var process = function(e) {
  var source = sourceBox.value;
  var parsedContentTree = SimpleMarkdown.defaultBlockParse(source);
  var html = output(parsedContentTree);
  outputBox.innerHTML = html;
} 
sourceBox.addEventListener('input', process);
process();
fetch('README.md').then(function(res) {
  return res.text();
}).then(function(md) {
  sourceBox.value = md;
  setTimeout(process, 0);
}).catch(function(err) {
  console.error(err);
});
</script>
</body>
